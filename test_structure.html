<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>结构测试</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<div id="app">
    <h1>HTML 结构验证测试</h1>
    
    <!-- 测试商品网格布局 -->
    <div class="p-6">
        <h2 class="text-xl mb-4">商品网格测试</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
            <div v-for="i in 8" :key="i" class="bg-gray-100 p-4 rounded-lg border">
                <div class="aspect-square bg-gray-300 mb-2"></div>
                <h3 class="font-bold">商品 {{ i }}</h3>
                <p class="text-sm text-gray-600">价格: ¥99.00</p>
            </div>
        </div>
    </div>
    
    <!-- 测试对话框 -->
    <button @click="showDialog = true" class="m-6 px-4 py-2 bg-blue-500 text-white rounded">
        打开对话框
    </button>
    
    <div v-if="showDialog" class="fixed inset-0 bg-black/50 flex items-center justify-center" @click.self="showDialog = false">
        <div class="bg-white p-6 rounded-lg max-w-md">
            <h3 class="text-lg font-bold mb-4">测试对话框</h3>
            <p class="mb-4">这是一个测试对话框</p>
            <button @click="showDialog = false" class="px-4 py-2 bg-gray-500 text-white rounded">
                关闭
            </button>
        </div>
    </div>
</div>

<script>
const { createApp, ref } = Vue
createApp({
    setup() {
        const showDialog = ref(false)
        return { showDialog }
    }
}).mount('#app')
</script>
</body>
</html>
