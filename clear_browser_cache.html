<!DOCTYPE html>
<html>
<head>
    <title>清除缓存</title>
</head>
<body>
    <h1>清除浏览器缓存和存储</h1>
    <button onclick="clearAll()">点击清除所有缓存</button>
    <div id="result"></div>
    
    <script>
    function clearAll() {
        // 清除 localStorage
        localStorage.clear();
        
        // 清除 sessionStorage
        sessionStorage.clear();
        
        // 清除所有 cookies
        document.cookie.split(";").forEach(function(c) { 
            document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/"); 
        });
        
        document.getElementById('result').innerHTML = '<p style="color: green;">✓ 已清除所有缓存！请关闭此页面，然后按 Ctrl+Shift+R 强制刷新主页面。</p>';
    }
    </script>
</body>
</html>
