<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>诊断工具</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #fff; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .result { background: #2a2a2a; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .error { color: #ff6b6b; }
        .success { color: #51cf66; }
    </style>
</head>
<body>
    <h1>爬虫配置对话框诊断工具</h1>
    
    <button onclick="checkDialog()">检查对话框状态</button>
    <button onclick="checkVue()">检查Vue实例</button>
    <button onclick="forceHide()">强制隐藏对话框</button>
    
    <div id="output"></div>
    
    <script>
        function log(message, type = 'info') {
            const output = document.getElementById('output');
            const div = document.createElement('div');
            div.className = 'result ' + type;
            div.textContent = message;
            output.appendChild(div);
        }
        
        function checkDialog() {
            document.getElementById('output').innerHTML = '';
            
            // 检查DOM中是否存在对话框
            const dialogs = document.querySelectorAll('[class*="爬虫配置"]');
            log(`找到 ${dialogs.length} 个包含"爬虫配置"的元素`);
            
            // 检查所有fixed定位的元素
            const fixedElements = document.querySelectorAll('.fixed');
            log(`找到 ${fixedElements.length} 个 fixed 定位的元素`);
            
            fixedElements.forEach((el, index) => {
                const text = el.textContent.substring(0, 50);
                const display = window.getComputedStyle(el).display;
                const visibility = window.getComputedStyle(el).visibility;
                const zIndex = window.getComputedStyle(el).zIndex;
                log(`元素 ${index + 1}: display=${display}, visibility=${visibility}, z-index=${zIndex}, text="${text}..."`);
            });
        }
        
        function checkVue() {
            document.getElementById('output').innerHTML = '';
            
            try {
                // 尝试访问Vue实例
                const app = document.querySelector('#app').__vueParentComponent;
                if (app) {
                    log('✓ 找到Vue实例', 'success');
                    log('Vue版本: ' + Vue.version);
                } else {
                    log('✗ 未找到Vue实例', 'error');
                }
            } catch (e) {
                log('✗ 访问Vue实例失败: ' + e.message, 'error');
            }
        }
        
        function forceHide() {
            document.getElementById('output').innerHTML = '';
            
            // 强制隐藏所有可能的对话框
            const fixedElements = document.querySelectorAll('.fixed');
            let hidden = 0;
            
            fixedElements.forEach(el => {
                if (el.textContent.includes('爬虫配置')) {
                    el.style.display = 'none';
                    el.remove();
                    hidden++;
                }
            });
            
            log(`已强制隐藏/移除 ${hidden} 个对话框元素`, hidden > 0 ? 'success' : 'info');
            
            if (hidden === 0) {
                log('未找到需要隐藏的对话框', 'info');
            }
        }
        
        // 页面加载时自动检查
        window.addEventListener('load', () => {
            setTimeout(() => {
                log('=== 页面加载完成，自动检查 ===');
                checkDialog();
            }, 1000);
        });
    </script>
</body>
</html>
