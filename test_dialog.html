<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试对话框</title>
    <script src="frontend/lib/vue.global.prod.js"></script>
    <style>
        body { margin: 0; padding: 20px; font-family: sans-serif; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

<div id="app">
    <h1>对话框测试</h1>
    <p>showCrawlerConfig 当前值: {{ showCrawlerConfig }}</p>
    <button @click="showCrawlerConfig = true">打开对话框</button>
    
    <!-- 对话框 -->
    <div v-if="showCrawlerConfig" style="position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 9999;" @click.self="showCrawlerConfig = false">
        <div style="background: white; padding: 30px; border-radius: 10px; color: black;">
            <h2>爬虫配置</h2>
            <p>这是一个测试对话框</p>
            <button @click="showCrawlerConfig = false">关闭</button>
        </div>
    </div>
</div>

<script>
const { createApp, ref } = Vue

createApp({
    setup() {
        const showCrawlerConfig = ref(false)
        
        console.log('初始化 showCrawlerConfig:', showCrawlerConfig.value)
        
        return {
            showCrawlerConfig
        }
    }
}).mount('#app')
</script>

</body>
</html>
